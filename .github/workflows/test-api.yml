name: Test Cloudflare API Access

on:
  workflow_dispatch:  # Запускается вручную

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Cloudflare API Token
        run: |
          # Проверяем валидность токена
          curl -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq .
      
      - name: Get Project Info
        run: |
          # Получаем информацию о проекте Pages
          curl -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/${{ secrets.CLOUDFLARE_PROJECT_NAME }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq .
      
      - name: Get Last Deployments
        run: |
          # Смотрим последние деплои
          curl -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/${{ secrets.CLOUDFLARE_PROJECT_NAME }}/deployments?per_page=3" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq '.result[] | {id: .id, status: .status, created_on: .created_on}'
      
      - name: Test Direct Upload Capability
        run: |
          # Создаём тестовый файл
          echo '{"test": "Hello from API test"}' > test.json
          
          # Пробуем загрузить через API (проверяем возможность)
          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/${{ secrets.CLOUDFLARE_PROJECT_NAME }}/assets" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -F "file=@test.json;path=/test.json" \
            -w "\nHTTP Status: %{http_code}\n"
